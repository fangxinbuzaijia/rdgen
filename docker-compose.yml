services:
  rdgen:
    build: .
    image: rdgen-cn:latest
    restart: unless-stopped
    environment:
      SECRET_KEY: "${SECRET_KEY}"
      GHUSER: "${GHUSER:-fangxinbuzaijia}"
      GHBEARER: "${GHBEARER}"
      GENURL: "${GENURL:-https://rdgen.920813.xyz}"
      ZIP_PASSWORD: "${ZIP_PASSWORD}"
      CALLBACK_TOKEN: "${CALLBACK_TOKEN}"
      GHBRANCH: "${GHBRANCH:-master}"
      PROTOCOL: "${PROTOCOL:-https}"
      REPONAME: "${REPONAME:-rdgen}"
      SH_SECRET: "${SH_SECRET:-}"
      DB_PATH: "${DB_PATH:-/opt/rdgen/data/db.sqlite3}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-rdgen.920813.xyz,localhost,127.0.0.1}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-https://rdgen.920813.xyz}"
    ports:
      - "8022:8000"
    dns:
      - 8.8.8.8
    volumes:
      - ./data:/opt/rdgen/data
      - ./exe:/opt/rdgen/exe
      - ./png:/opt/rdgen/png
      - ./temp_zips:/opt/rdgen/temp_zips
