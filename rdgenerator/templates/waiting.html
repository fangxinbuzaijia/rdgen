<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在生成客户端</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0b0d10;
            color: #eef2f7;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            text-align: center;
        }
        main {
            width: min(520px, calc(100% - 32px));
            padding: 28px;
            border: 1px solid #2a3140;
            border-radius: 8px;
            background: #151922;
        }
        .spinner {
            width: 42px;
            height: 42px;
            margin: 22px auto;
            border: 4px solid #2a3140;
            border-top-color: #2f80ed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #a9b3c3; line-height: 1.7; }
        a { color: #83b9ff; }
    </style>
</head>
<body>
<main>
    <h1>构建任务已提交</h1>
    <div class="spinner"></div>
    <p>平台：{{ platform }}<br>状态：{{ status }}</p>
    <p>构建通常需要 30-45 分钟。页面会自动刷新，完成后会显示下载链接。</p>
    <p><a href="{{ log_url }}" target="_blank">查看 GitHub Actions 日志</a></p>
</main>
<script>
    setTimeout(function() {
        window.location.replace('/check_for_file?filename={{filename}}&uuid={{uuid}}&platform={{platform}}');
    }, 30000);
</script>
</body>
</html>
