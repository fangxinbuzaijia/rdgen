<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户端生成成功</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0b0d10;
            color: #eef2f7;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }
        main {
            width: min(720px, calc(100% - 32px));
            padding: 28px;
            border: 1px solid #2a3140;
            border-radius: 8px;
            background: #151922;
            text-align: center;
        }
        .downloads {
            display: grid;
            gap: 10px;
            margin-top: 22px;
        }
        a.download {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 6px;
            background: #2f80ed;
            color: #fff;
            text-decoration: none;
            word-break: break-all;
        }
        .hint, .back { color: #a9b3c3; }
        .back { display: inline-block; margin-top: 22px; }
        .empty {
            margin-top: 20px;
            padding: 14px;
            border: 1px solid #3c4658;
            border-radius: 6px;
            color: #d4dbe7;
            background: #10141b;
        }
    </style>
</head>
<body>
<main>
    <h1>客户端生成成功</h1>
    <p class="hint">平台：{{ platform }}。以下仅显示服务器实际收到的文件。</p>
    {% if files %}
        <div class="downloads">
            {% for file in files %}
                <a href='/download?filename={{ file }}&uuid={{ uuid }}' class="download">
                    <span>{{ file }}</span>
                    <strong>下载</strong>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <div class="empty">构建状态为成功，但服务器暂未发现生成文件。请检查 GitHub Actions 上传步骤日志。</div>
    {% endif %}
    <a href="/" class="back">返回构建器</a>
</main>
</body>
</html>
