<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户端生成失败</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #160d0d;
            color: #fff4f4;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }
        main {
            width: min(620px, calc(100% - 32px));
            padding: 28px;
            border: 1px solid #633;
            border-radius: 8px;
            background: #241414;
            text-align: center;
        }
        p { color: #e8b8b8; line-height: 1.7; }
        a {
            color: #fff;
            display: inline-block;
            margin: 8px;
            padding: 10px 14px;
            border-radius: 6px;
            background: #b42323;
            text-decoration: none;
        }
        a.secondary { background: #513030; }
    </style>
</head>
<body>
<main>
    <h1>构建没有成功完成</h1>
    <p>状态：{{ status }}。可能是 GitHub Actions 编译失败、权限不足、仓库 Actions 未启用，或 RustDesk 版本与补丁不兼容。</p>
    <a href="{{ log_url }}" target="_blank">查看构建日志</a>
    <a href="/" class="secondary">返回构建器</a>
</main>
</body>
</html>
